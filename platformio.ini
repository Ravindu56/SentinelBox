; =====================================================================
; platformio.ini — Disaster-Proof BlackBox
; EC6020 Embedded Systems Design — Group 15
;
; Environments:
;   mega        — Arduino Mega 2560 (dev/testing — pin-compatible)
;   atmega328p  — Bare ATmega328P chip (final production board)
;   esp32       — ESP32 WROOM utility node (GPS/WiFi/MQTT/dashboard)
;
; Upload commands:
;   pio run -e mega        -t upload
;   pio run -e atmega328p  -t upload
;   pio run -e esp32       -t upload
;
; Monitor:
;   pio device monitor -e mega   -b 115200
;   pio device monitor -e esp32  -b 115200
; =====================================================================

[platformio]
default_envs = mega, esp32
extra_scripts = pre:scripts/no_intellisense_overwrite.py 

; ── Shared settings ──────────────────────────────────────────────────
[common_atmega]
platform  = atmelavr
framework = arduino
build_src_filter = +<atmega/>
monitor_speed = 115200
monitor_filters = colorize, time
lib_deps =
  adafruit/DHT sensor library @ ^1.4.6
  adafruit/Adafruit Unified Sensor @ ^1.1.14
  adafruit/RTClib @ ^2.1.4
  arduino-libraries/SD @ ^1.3.0

; ── ENV: Mega 2560 (testing) ─────────────────────────────────────────
[env:mega]
extends         = common_atmega
board           = megaatmega2560
upload_port     = /dev/ttyACM0   ; change to your port (Windows: COM3)
monitor_port    = /dev/ttyACM0
build_flags     =
  -DTARGET_MEGA
  -DSERIAL_DEBUG=1
  -DSD_CS_PIN=53  ; SD CS pin for Mega (53) --- override common
  -DSIM_RX=19
  -DSIM_TX=18

; ── ENV: ATmega328P bare chip (production) ───────────────────────────
[env:atmega328p]
extends         = common_atmega
board           = uno            ; same Arduino core; just swap board target
upload_port     = /dev/ttyACM0
monitor_port    = /dev/ttyACM0
upload_protocol = arduino
build_flags     =
  -DTARGET_328P
  -DSERIAL_DEBUG=0      
  -DSD_CS_PIN=10    ; SD CS pin for Uno (10) --- override common

; ── ENV: ESP32 WROOM utility node ────────────────────────────────────
[env:esp32]
platform      = espressif32 @ ^6.5.0
board         = esp32dev
framework     = arduino
build_src_filter    = +<esp32/>
monitor_speed = 115200
monitor_filters = time
upload_port   = /dev/ttyUSB0
monitor_port  = /dev/ttyUSB0
upload_speed  = 921600
board_build.partitions = min_spiffs.csv
build_flags   =
  -DCORE_DEBUG_LEVEL=0
lib_deps =
  mikalhart/TinyGPSPlus @ ^1.0.3
  knolleary/PubSubClient @ ^2.8.0
  ESP32Async/ESPAsyncWebServer @ ^3.7.7
  ESP32Async/AsyncTCP @ ^3.3.2

; ── ENV: Unit tests on Mega ──────────────────────────────────────────
; ── Shared test settings (no Unity) ──────────────────────────────────
[common_test]
platform         = atmelavr
framework        = arduino
board            = megaatmega2560
upload_port      = /dev/ttyACM1
monitor_port     = /dev/ttyACM1
monitor_speed    = 115200
monitor_filters  = time
test_framework   = custom          ; ← disables Unity completely

; ── RTC test env ──────────────────────────────────────────────────────
[env:test_rtc]
extends          = common_test
build_src_filter = +<../test/test_rtc/>
lib_deps =
  adafruit/RTClib @ ^2.1.4
  Wire

; ── Sensor test env ───────────────────────────────────────────────────
[env:test_sensors]
extends          = common_test
build_src_filter = +<../test/test_sensors/>
build_flags      = -DTARGET_MEGA -DSERIAL_DEBUG=1 -I src/atmega
lib_deps =
  adafruit/DHT sensor library @ ^1.4.6
  adafruit/Adafruit Unified Sensor @ ^1.1.14
  Wire

; ── GSM test env ──────────────────────────────────────────────────────
[env:test_gsm]
extends          = common_test
build_src_filter = +<../test/test_gsm/>
build_flags      =
  -DTARGET_MEGA
  -DSERIAL_DEBUG=0
  -I src/atmega
  -I include
  -DSIM_RX=19
  -DSIM_TX=18
lib_deps =
  SoftwareSerial

[env:test_sd]
extends          = common_test
build_src_filter = +<../test/test_sd/>
lib_deps =
  arduino-libraries/SD @ ^1.3.0
  SPI

build_flags      = -DTARGET_MEGA 
  -DSERIAL_DEBUG=1 
  -I src/atmega 
  -DSD_CS_PIN=53 

; _______________________________________________-

[env:esp32_test]
platform              = espressif32 @ ^6.5.0
board                 = esp32dev
framework             = arduino
src_filter            = +<esp32/test_esp32.cpp>
upload_port           = /dev/ttyUSB1
monitor_port          = /dev/ttyUSB1
monitor_speed         = 115200
lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3
    knolleary/PubSubClient @ ^2.8.0

[env:mega_test]
platform              = atmelavr
board                 = megaatmega2560
framework             = arduino
src_filter            = +<mega/test_mega.cpp>
upload_port           = /dev/ttyACM0
monitor_port          = /dev/ttyACM0
monitor_speed         = 115200
lib_deps =
    adafruit/DHT sensor library @ ^1.4.7
    adafruit/Adafruit Unified Sensor @ ^1.1.15
    adafruit/RTClib @ ^2.1.4
    arduino-libraries/SD @ ^1.3.0


