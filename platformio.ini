; =====================================================================
; platformio.ini — Disaster-Proof BlackBox
; EC6020 Embedded Systems Design — Group 15
;
; Environments:
;   mega        — Arduino Mega 2560 (dev/testing — pin-compatible)
;   atmega328p  — Bare ATmega328P chip (final production board)
;   esp32       — ESP32 WROOM utility node (GPS/WiFi/MQTT/dashboard)
;
; Upload commands:
;   pio run -e mega        -t upload
;   pio run -e atmega328p  -t upload
;   pio run -e esp32       -t upload
;
; Monitor:
;   pio device monitor -e mega   -b 115200
;   pio device monitor -e esp32  -b 115200
; =====================================================================

[platformio]
default_envs = mega, esp32

; ── Shared settings ──────────────────────────────────────────────────
[common_atmega]
platform  = atmelavr
framework = arduino
src_filter = +<atmega/>
monitor_speed = 115200
monitor_filters = colorize, time
lib_deps =
  adafruit/DHT sensor library @ ^1.4.6
  adafruit/Adafruit Unified Sensor @ ^1.1.14
  adafruit/RTClib @ ^2.1.4
  arduino-libraries/SD @ ^1.3.0

; ── ENV: Mega 2560 (testing) ─────────────────────────────────────────
[env:mega]
extends         = common_atmega
board           = megaatmega2560
upload_port     = /dev/ttyACM0   ; change to your port (Windows: COM3)
monitor_port    = /dev/ttyACM0
build_flags     =
  -DTARGET_MEGA
  -DSERIAL_DEBUG=1

; ── ENV: ATmega328P bare chip (production) ───────────────────────────
[env:atmega328p]
extends         = common_atmega
board           = uno            ; same Arduino core; just swap board target
upload_port     = /dev/ttyUSB1
monitor_port    = /dev/ttyUSB1
upload_protocol = arduino
build_flags     =
  -DTARGET_328P
  -DSERIAL_DEBUG=0               ; disable debug prints to save flash/RAM

; ── ENV: ESP32 WROOM utility node ────────────────────────────────────
[env:esp32]
platform      = espressif32 @ ^6.5.0
board         = esp32dev
framework     = arduino
src_filter    = +<esp32/>
monitor_speed = 115200
monitor_filters = colorize, time
upload_port   = /dev/ttyUSB2
monitor_port  = /dev/ttyUSB2
upload_speed  = 921600
board_build.partitions = min_spiffs.csv
build_flags   =
  -DCORE_DEBUG_LEVEL=0
lib_deps =
  mikalhart/TinyGPSPlus @ ^1.0.3
  knolleary/PubSubClient @ ^2.8.0
  me-no-dev/ESP Async WebServer @ ^1.2.3
  me-no-dev/AsyncTCP @ ^1.1.1